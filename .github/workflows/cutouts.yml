name: auto-cutouts
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  cutouts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install rembg onnxruntime pillow requests numpy
      - run: python cut.py
        env:
          UPLOAD_URL: https://scottsfavs.com/cutout_upload.php
          UPLOAD_TOKEN: ${{ secrets.CUTOUT_TOKEN }}
